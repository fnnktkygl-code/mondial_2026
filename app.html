<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/mondial_2026/">

  <script>
    // Automatically redirect to the native app custom URL scheme on mobile/macOS if there's a group query parameter
    (function() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const groupPayload = urlParams.get('group');
        if (groupPayload) {
          const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
          const isMac = /Macintosh|MacIntel|MacPPC|MacIPHONE/i.test(navigator.userAgent);
          if (isMobile || isMac) {
            const customScheme = "mondial2026://group?group=" + groupPayload;
            window.location.href = customScheme;
            console.log("Redirecting to custom scheme: " + customScheme);
          }
        }
      } catch (e) {
        console.error("Deep link redirect error:", e);
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mondial_2026">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mondial_2026</title>
  <link rel="manifest" href="manifest.json">
</head>

</body>
</html>
