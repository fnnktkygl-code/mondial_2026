name: Update WC 2026 Match Data

on:
  schedule:
    # Every 15 minutes during tournament (June 11 – July 20, 2026)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live match data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node scripts/update_matches.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/initial_matches.json assets/matches_meta.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update WC 2026 match data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
